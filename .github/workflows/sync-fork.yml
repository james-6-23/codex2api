name: Sync fork with upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-fork-with-upstream
  cancel-in-progress: true

jobs:
  sync:
    name: Sync main from upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/james-6-23/codex2api.git || \
            git remote set-url upstream https://github.com/james-6-23/codex2api.git
          git fetch upstream main

      - name: Fast-forward main from upstream
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push synced main
        run: git push origin main
