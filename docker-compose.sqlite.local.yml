name: codex2api-sqlite-local

services:
  codex2api:
    build: .
    container_name: codex2api-sqlite-local
    ports:
      # Bind to localhost only by default for security.
      # To expose on all interfaces, set BIND_HOST=0.0.0.0 in .env or override here.
      - "127.0.0.1:${CODEX_PORT:-8080}:${CODEX_PORT:-8080}"
    env_file:
      - .env
    volumes:
      - sqlite-data-local:/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  sqlite-data-local:
    name: codex2api-sqlite-local_sqlite-data-local
